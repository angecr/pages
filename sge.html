<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Interactivo: Sistemas de Gestión Empresarial</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #d35400;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --background-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }

        .progress {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--secondary-color);
            background: #fdf2e9;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .score {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--success-color);
        }

        h2 {
            font-size: 1.35em;
            margin-bottom: 25px;
            color: var(--primary-color);
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 1.05em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            min-width: 30px;
            border-radius: 6px;
            background-color: #f0f3f7;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 0.95em;
            border: 1px solid #dcdde1;
            transition: all 0.2s ease;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .option-text {
            flex: 1;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #fef9f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .option-btn.pre-selected {
            border-color: var(--primary-color);
            background-color: #eef2f8;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(26, 54, 93, 0.18);
        }

        .option-btn.pre-selected .option-number {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .option-btn.correct {
            background-color: #eafaf1;
            border-color: var(--success-color);
            color: #1e8449;
            font-weight: 700;
        }

        .option-btn.correct .option-number {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.incorrect {
            background-color: #fceae9;
            border-color: var(--accent-color);
            color: #c0392b;
        }

        .option-btn.incorrect .option-number {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .keyboard-hint {
            margin-top: 18px;
            padding: 10px 14px;
            background-color: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85em;
            color: #7f8c8d;
            text-align: center;
            border: 1px dashed #dcdde1;
        }

        .keyboard-hint kbd {
            display: inline-block;
            padding: 2px 8px;
            background: white;
            border: 1px solid #bdc3c7;
            border-bottom-width: 2px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: var(--primary-color);
            font-weight: 700;
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            margin: 0 2px;
        }

        .justification-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #fcf6f2;
            border-left: 5px solid var(--secondary-color);
            border-radius: 6px;
            font-size: 1.05em;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .justification-box h4 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }

        .next-btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn, .restart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            display: none;
            box-shadow: 0 4px 6px rgba(211, 84, 0, 0.2);
        }

        .next-btn:hover, .restart-btn:hover {
            background-color: #a04000;
            transform: translateY(-2px);
        }

        .next-btn .kbd-inline {
            display: inline-block;
            padding: 1px 7px;
            background: rgba(255,255,255,0.22);
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85em;
            margin-left: 8px;
            font-weight: 700;
        }

        .restart-btn {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2em;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .results-screen p {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 4em;
            font-weight: 800;
            color: var(--secondary-color);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #quiz-container { padding: 25px 20px; }
            h2 { font-size: 1.2em; }
            .option-btn { font-size: 1em; padding: 12px 14px; }
            .option-number { width: 26px; height: 26px; min-width: 26px; font-size: 0.85em; }
            .final-score { font-size: 3em; }
            .keyboard-hint { font-size: 0.78em; }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="question-screen">
            <div class="header">
                <div class="progress" id="progress">Pregunta -- de --</div>
                <div class="score" id="score">Aciertos: 0</div>
            </div>
            
            <h2 id="question-text">¿Pregunta?</h2>
            
            <div class="options-container" id="options"></div>

            <div class="justification-box" id="justification">
                <h4>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg> 
                    Explicación
                </h4>
                <p id="justification-text"></p>
            </div>
           
            <div class="next-btn-container">
                <button class="next-btn" id="next-btn" onclick="handleNext()">Siguiente Pregunta<span class="kbd-inline">Enter</span></button>
            </div>

            <div class="keyboard-hint">
                <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> o <kbd>↑</kbd> <kbd>↓</kbd> para seleccionar · <kbd>Enter</kbd> para confirmar y avanzar
            </div>
        </div>

        <div class="results-screen" id="results-screen">
            <h1>¡Test Completado!</h1>
            <p>Has finalizado el repaso exhaustivo de Sistemas de Gestión Empresarial.</p>
            <div class="final-score" id="final-score">0 / X</div>
            <button class="restart-btn" onclick="startQuiz()">Reintentar Cuestionario Aleatorio</button>
        </div>
    </div>

    <script>
        const rawQuestions = [
            {
                q: "¿Qué significan las siglas ERP?",
                options: ["Enterprise Relational Program.", "Enterprise Resource Planning.", "Execution Resource Planning.", "Enterprise Record Program."],
                correct: "Enterprise Resource Planning.",
                justification: "Las siglas ERP provienen del inglés 'Enterprise Resource Planning', que se traduce al castellano como Sistema de Planificación de Recursos Empresariales [1]."
            },
            {
                q: "¿Qué tipo de instalación de un ERP es más conveniente para realizar pruebas, entornos de desarrollo o aprendizaje?",
                options: ["SaaS.", "Cliente-servidor.", "Cliente-servidor web.", "Monopuesto."],
                correct: "Monopuesto.",
                justification: "En la instalación monopuesto, todo el ERP (base de datos y aplicación) reside en la misma computadora. Es ideal para aprender, pero no sirve para entornos productivos reales con varios empleados [2, 3]."
            },
            {
                q: "¿Cuál es el objetivo principal de un sistema CRM (Customer Relationship Management)?",
                options: ["Gestionar la contabilidad de la empresa.", "Mejorar y administrar la relación con los clientes.", "Controlar el stock del almacén.", "Desarrollar nuevos programas informáticos."],
                correct: "Mejorar y administrar la relación con los clientes.",
                justification: "Un CRM es un software que hace referencia a la estrategia de negocios centrada específicamente en el cliente, buscando establecer relaciones duraderas y satisfactorias [4, 5]."
            },
            {
                q: "Si clasificamos el software por su coste, ¿cómo se llama aquel que se puede usar gratis por un tiempo de prueba, pero luego requiere un pago?",
                options: ["Freeware.", "Payware.", "Shareware.", "Software libre."],
                correct: "Shareware.",
                justification: "El Shareware es un modelo de distribución donde el software puede usarse sin coste durante un periodo de tiempo. Pasado ese tiempo, para continuar usándolo, se debe realizar un pago al autor [6]."
            },
            {
                q: "En el lenguaje de programación Python, ¿cómo se delimitación los bloques de código (como los bucles o condicionales)?",
                options: ["Con llaves {}.", "Mediante el sangrado o indentación (espacios en blanco).", "Con las palabras reservadas BEGIN y END.", "Con corchetes []."],
                correct: "Mediante el sangrado o indentación (espacios en blanco).",
                justification: "En Python no existen llaves para definir bloques explícitos. Los bloques comienzan con dos puntos (:) y todo lo que llevan dentro debe contener una serie de espacios en blanco al inicio de la línea, conocido como sangrado [7]."
            },
            {
                q: "¿Cuál es la mínima unidad de estructura de una base de datos relacional, donde los registros se agrupan en filas y columnas?",
                options: ["Dato.", "Vista.", "Consulta.", "Tabla."],
                correct: "Tabla.",
                justification: "La tabla es la unidad estructural fundamental del modelo relacional. Es el conjunto de registros o filas relacionadas que se almacenan bajo un mismo nombre [8]."
            },
            {
                q: "¿En qué lenguaje de programación está desarrollado el servidor del ERP libre Odoo?",
                options: ["Java.", "C++.", "Python.", "PHP."],
                correct: "Python.",
                justification: "Odoo presenta una arquitectura basada en cliente-servidor, donde la parte del servidor se desarrolla íntegramente utilizando el lenguaje Python [9, 10]."
            },
            {
                q: "En el lenguaje Python, ¿qué función predefinida se utiliza para mostrar texto o variables por pantalla?",
                options: ["Look().", "Out().", "Remove().", "print()."],
                correct: "print().",
                justification: "En Python, la impresión por consola se realiza mediante la variable denominada cadena de formato utilizando la función nativa print()."
            },
            {
                q: "En la gestión de productos dentro del ERP, ¿qué tipo de productos SÍ se contabilizan y llevan un control estricto en el stock?",
                options: ["Los consumibles.", "Los almacenables.", "Los servicios.", "Ninguna de las respuestas es correcta."],
                correct: "Los almacenables.",
                justification: "A diferencia de los servicios o los consumibles (que se asumen como ilimitados), solo los productos clasificados como 'almacenables' generan un control de inventario real en el sistema."
            },
            {
                q: "¿Qué es exactamente PostgreSQL en el entorno de los sistemas ERP como Odoo?",
                options: ["Es un sistema de código abierto de administración de bases de datos de tipo relacional.", "Es un sistema gestor de bases de datos de tipo NO relacional.", "Es un lenguaje de programación orientado a objetos.", "Es el módulo de compras del ERP."],
                correct: "Es un sistema de código abierto de administración de bases de datos de tipo relacional.",
                justification: "PostgreSQL es el SGBD (Sistema Gestor de Bases de Datos) relacional y de código abierto recomendado y utilizado por defecto para dar soporte de datos a Odoo."
            },
            {
                q: "¿Qué paradigma o arquitectura utiliza el ERP Odoo para separar y diferenciar los datos puros de su representación visual por pantalla?",
                options: ["El modelo Vista-Servidor.", "El modelo Cliente-Nube.", "El MVC (Modelo-Vista-Controlador).", "El MVC (Modelo-Vista-Clasificador)."],
                correct: "El MVC (Modelo-Vista-Controlador).",
                justification: "El paradigma MVC permite una gran independencia, separando la lógica de los datos (Modelo) de la interfaz gráfica que ve el usuario (Vista) gracias a un gestor intermedio (Controlador)."
            },
            {
                q: "En la logística de un ERP, ¿qué modalidad de albaranes existen para justificar el movimiento de la mercancía?",
                options: ["Solo de entrada.", "De entrada y de salida.", "Solo externos.", "De entrada, de salida y externos (Todas las respuestas son correctas)."],
                correct: "De entrada, de salida y externos (Todas las respuestas son correctas).",
                justification: "Los albaranes justifican las recepciones (entrada), envíos a clientes (salida) y los movimientos entre distintos almacenes o ubicaciones propias (externos/internos)."
            },
            {
                q: "A la hora de importar o exportar datos de forma masiva en un sistema ERP-CRM (como Odoo), ¿qué tipo de archivos se utilizan habitualmente?",
                options: ["Archivos flag y tiff.", "Archivos txt y blob.", "Archivos xml y csv.", "Archivos doc y pdf."],
                correct: "Archivos xml y csv.",
                justification: "El lenguaje de marcado XML y los archivos separados por comas (CSV) son los formatos estándar más eficientes y compatibles soportados por el lenguaje Python y Odoo para la carga de datos."
            },
            {
                q: "Según la metodología clásica de implantación de un sistema ERP-CRM, ¿de cuántas fases consta el proyecto completo?",
                options: ["Consta de 3 fases.", "Consta de 4 fases.", "Consta de 5 fases.", "Consta de 6 fases."],
                correct: "Consta de 5 fases.",
                justification: "Un proyecto organizado se divide en 5 fases estables: Iniciación, Desarrollo, Implementación, Implantación, y finalmente, Producción y soporte."
            },
            {
                q: "En la metodología de implantación, ¿en qué fase se lleva a cabo el análisis detallado y el diseño tanto lógico como físico del sistema?",
                options: ["En la fase de Iniciación.", "En la fase de Desarrollo.", "En la fase de Implementación.", "En la fase de Producción."],
                correct: "En la fase de Desarrollo.",
                justification: "Tras el estudio inicial, la Fase 2 (Desarrollo) es donde el equipo técnico diseña la estructura física y lógica sobre papel antes de comprar los equipos o instalar el software."
            },
            {
                q: "En el lenguaje Python, ¿qué función nativa se utiliza para devolver la longitud o el número de elementos que tiene una cadena de texto?",
                options: ["longitud(cadena).", "size(cadena).", "count(cadena).", "len(cadena)."],
                correct: "len(cadena).",
                justification: "La función len() (abreviatura de 'length' en inglés) es el comando interno de Python utilizado para devolver la longitud de un determinado objeto, como una cadena o una lista."
            },
            {
                q: "¿Qué módulo específico nos permite crear una orden de compra de forma directa en el ERP?",
                options: ["El módulo de Punto de Venta.", "El módulo de Ventas.", "El módulo de Compras.", "El módulo de Marketing."],
                correct: "El módulo de Compras.",
                justification: "Es el módulo logístico específico encargado del aprovisionamiento, permitiendo dar de alta proveedores, solicitar presupuestos y emitir las órdenes directas de compra."
            },
            {
                q: "¿Qué valores permite almacenar una variable de tipo Booleano en el código de Python?",
                options: ["Números del 0 al 10.", "Cadenas de texto.", "Únicamente True (Verdadero) o False (Falso).", "Cualquier número decimal."],
                correct: "Únicamente True (Verdadero) o False (Falso).",
                justification: "El tipo de dato booleano es el más conveniente cuando se trabaja con expresiones condicionales, ya que solo permite almacenar los valores lógicos de True o False [12]."
            },
            {
                q: "En el módulo de logística, ¿qué documento del ERP sirve como justificante legal para confirmar la entrega o el movimiento de un producto en el almacén?",
                options: ["La factura.", "El asiento contable.", "El pedido de venta.", "El albarán."],
                correct: "El albarán.",
                justification: "Los albaranes son los justificantes que confirman la entrega o recepción de un determinado producto. Pueden ser de entrada, de salida o externos para movimientos entre ubicaciones [13]."
            },
            {
                q: "¿Cuál de las siguientes opciones NO es un objetivo principal al implantar un sistema de gestión empresarial (ERP)?",
                options: ["Compartir información entre los distintos departamentos.", "Tener que mantener siempre los mismos proveedores.", "Automatizar los procesos internos de la empresa.", "Ordenar toda la información en un mismo lugar y base de datos."],
                correct: "Tener que mantener siempre los mismos proveedores.",
                justification: "El objetivo de un ERP no es limitar a la empresa a usar siempre los mismos proveedores, sino todo lo contrario: gestionar eficazmente las relaciones con múltiples proveedores (módulos SRM), planificar, automatizar procesos y mejorar el control general [1, 2]."
            },
            {
                q: "En el entorno del ERP Odoo, al visualizar la información técnica de las aplicaciones, ¿cuál es el nombre técnico o identificador del módulo encargado de la Facturación y Contabilidad?",
                options: ["purchase", "sale_management", "account", "contacts"],
                correct: "account",
                justification: "En Odoo, el identificador técnico en el código para el módulo de Facturación / Contabilidad es 'account' [3, 4]."
            },
            {
                q: "En relación con el diseño de interfaces en un sistema ERP, ¿cuál de los siguientes es un tipo de vista utilizada para mostrar el contenido y los registros organizados en listados por filas?",
                options: ["Vista estructurada.", "Vista relacional.", "Vista en árbol.", "Vista de índice."],
                correct: "Vista en árbol.",
                justification: "La 'vista en árbol' es uno de los componentes visuales principales y se utiliza específicamente en los listados de datos para mostrar los registros organizados de forma horizontal en filas [5]."
            },
            {
                q: "¿Cuáles de las siguientes opciones describen las finalidades principales de un Sistema Gestor de Bases de Datos (SGBD) dentro de un ERP?",
                options: ["Extraer y manipular datos.", "Almacenar datos de forma segura.", "Darle mayor utilidad a la información que se obtiene de las bases de datos.", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "El SGBD es el motor lógico de un ERP. Se encarga de guardar físicamente la información, gestionarla, extraerla con eficacia y darle una utilidad analítica en las consultas [6, 7]."
            },
            {
                q: "En el lenguaje Python, los objetos de tipo cadena (strings) incorporan funciones predefinidas. ¿Cuál de las siguientes funciones NO pertenece al tratamiento de cadenas en Python?",
                options: ["capitalize()", "splitlines()", "multiply()", "strip()"],
                correct: "multiply()",
                justification: "Python incorpora funciones nativas para cadenas como capitalize() (poner mayúscula inicial), splitlines() (dividir en líneas) y strip() (eliminar espacios) [8, 9]. La instrucción multiply() no existe como método de cadena predefinido [9]."
            },
            {
                q: "El paradigma de trabajar en la nube (cloud computing) permite al cliente contratar infraestructuras externas. ¿Qué modalidades existen en función de las opciones que asume el cliente?",
                options: ["SaaS (Software as a Service).", "IaaS (Infrastructure as a Service).", "PaaS (Platform as a Service).", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "Estas son las tres modalidades oficiales de servicios en la nube: SaaS deja toda la gestión técnica al proveedor, IaaS alquila el hardware a bajo nivel, y PaaS es un punto intermedio para plataformas [10, 11]."
            },
            {
                q: "La 'vista de búsqueda' en un ERP sirve para complementar a otras vistas. ¿Cuál de las siguientes acciones NO se puede realizar a través de un panel de vista de búsqueda?",
                options: ["Realizar operaciones complejas de filtrado sobre los registros.", "Añadir un panel de búsqueda en la parte superior del listado.", "Hacer transferencias bancarias directas.", "Agrupar los datos mostrados según un criterio determinado."],
                correct: "Hacer transferencias bancarias directas.",
                justification: "La vista de búsqueda es un elementó gráfico destinado exclusivamente a localizar, filtrar y agrupar información [12]. Las transacciones, como una transferencia bancaria, son operaciones que se realizan en un módulo contable editando registros en una vista de formulario [12, 13]."
            },
            {
                q: "¿Qué características tiene un ERP?",
                options: ["Modularidad, escalabilidad, oportunidad.", "Simplicidad, integración, rigidez.", "Integración, modularidad, adaptabilidad.", "Ninguna respuesta es correcta."],
                correct: "Integración, modularidad, adaptabilidad.",
                justification: "Un ERP engloba toda la actividad, funciona por módulos independientes y se adapta a los requerimientos de la empresa."
            },
            {
                q: "¿Qué palabras se identifican con la lógica operacional de los CRM?",
                options: ["Organizar.", "Automatizar.", "Gestionar.", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "La parte operacional del CRM automatiza y gestiona las ventas, el marketing, el soporte técnico y organiza el call center."
            },
            {
                q: "¿Qué tipo de base de datos es la mejor opción para un sistema de gestión de base de datos de un ERP?",

            {
                q: "¿Qué dos operadores se distinguen tanto para listas como para diccionarios en Python según el libro?",
                options: ["Operador de suma (+) y operador de resta (-).", "Operador de concatenación (+) y operador de repetición (*).", "Operador lógico (&&) y operador relacional (==).", "Operador de asignación (=) y operador de comparación (!=)."],
                correct: "Operador de concatenación (+) y operador de repetición (*).",
                justification: "El libro indica que para las listas (y de la misma forma que en los diccionarios) se pueden distinguir dos operadores: operador concatenación (+) y operador de repetición (*)."

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // === NUEVO: estado para navegación por teclado ===
        let preSelectedIndex = -1;   // índice de la opción resaltada (aún sin confirmar)
        let questionAnswered = false; // true cuando ya se ha confirmado la respuesta
        // ================================================

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startQuiz() {
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';

            quizData = JSON.parse(JSON.stringify(rawQuestions));
            quizData = shuffleArray(quizData);
            quizData.forEach(q => { q.options = shuffleArray(q.options); });

            currentQuestionIndex = 0;
            score = 0;
            updateUI();
            renderQuestion();
        }

        function updateUI() {
            document.getElementById('progress').innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
            document.getElementById('score').innerText = `Aciertos: ${score}`;
        }

        function renderQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            document.getElementById('justification').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            // Resetear estado de teclado para la nueva pregunta
            preSelectedIndex = -1;
            questionAnswered = false;

            currentQ.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.dataset.index = idx;

                // Número visible que indica qué tecla pulsar
                const numSpan = document.createElement('span');
                numSpan.className = 'option-number';
                numSpan.innerText = idx + 1;
                btn.appendChild(numSpan);

                const textSpan = document.createElement('span');
                textSpan.className = 'option-text';
                textSpan.innerText = option;
                btn.appendChild(textSpan);

                btn.onclick = () => commitOption(option, currentQ.correct, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // Resalta visualmente una opción sin confirmarla todavía
        function preSelectOption(index) {
            if (questionAnswered) return;
            const buttons = document.querySelectorAll('.option-btn');
            if (index < 0 || index >= buttons.length) return;

            buttons.forEach(b => b.classList.remove('pre-selected'));
            buttons[index].classList.add('pre-selected');
            preSelectedIndex = index;
        }

        // Confirma definitivamente la opción seleccionada (equivalente a hacer click)
        function commitOption(selected, correct, btnElement) {
            const allBtns = document.querySelectorAll('.option-btn');

            allBtns.forEach(btn => {
                btn.classList.remove('pre-selected');
                btn.disabled = true;
                if (btn.querySelector('.option-text').innerText === correct) {
                    btn.classList.add('correct');
                }
            });

            if (selected === correct) {
                score++;
                updateUI();
            } else {
                btnElement.classList.add('incorrect');
            }

            questionAnswered = true;

            document.getElementById('justification-text').innerText = quizData[currentQuestionIndex].justification;
            document.getElementById('justification').style.display = 'block';
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('next-btn').innerHTML =
                (currentQuestionIndex === quizData.length - 1 ? 'Ver Calificación Final' : 'Siguiente Pregunta')
                + '<span class="kbd-inline">Enter</span>';
        }

        // Compatibilidad: mantenemos la firma anterior por si se llama desde otro sitio
        function selectOption(selected, correct, btnElement) {
            commitOption(selected, correct, btnElement);
        }

        function handleNext() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                updateUI();
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        }

        // === MANEJADOR DE TECLADO ===
        document.addEventListener('keydown', (e) => {
            // En la pantalla de resultados: Enter reinicia el cuestionario
            if (document.getElementById('results-screen').style.display === 'block') {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    startQuiz();
                }
                return;
            }

            // Teclas 1-4 (tanto del teclado normal como del numpad con NumLock activo)
            // e.key devuelve "1","2","3","4" en ambos casos cuando NumLock está activo.
            if (/^[1-4]$/.test(e.key)) {
                e.preventDefault();
                const idx = parseInt(e.key, 10) - 1;
                preSelectOption(idx);
                return;
            }

            // Soporte explícito por code para numpad incluso sin NumLock activo
            // (e.code: "Numpad1", "Numpad2"...). Si el usuario tiene NumLock apagado
            // y pulsa Numpad1, e.key llega como "End" pero e.code sigue siendo "Numpad1".
            if (/^Numpad[1-4]$/.test(e.code)) {
                e.preventDefault();
                const idx = parseInt(e.code.replace('Numpad', ''), 10) - 1;
                preSelectOption(idx);
                return;
            }  
            
            // Flechas arriba/abajo: navegar entre las opciones (con vuelta al extremo)
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (questionAnswered) return;
                const buttons = document.querySelectorAll('.option-btn');
                if (buttons.length === 0) return;

                let nextIndex;
                if (preSelectedIndex < 0) {
                    // No hay nada resaltado todavía: empieza por arriba o por abajo según la tecla
                    nextIndex = (e.key === 'ArrowDown') ? 0 : buttons.length - 1;
                } else {
                    const delta = (e.key === 'ArrowDown') ? 1 : -1;
                    nextIndex = (preSelectedIndex + delta + buttons.length) % buttons.length;
                }
                preSelectOption(nextIndex);
                return;
            }
            // ENTER: confirma la opción pre-seleccionada o avanza si ya está corregida
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!questionAnswered) {
                    if (preSelectedIndex >= 0) {
                        const buttons = document.querySelectorAll('.option-btn');
                        buttons[preSelectedIndex].click();
                    }
                    // Si no hay nada pre-seleccionado, ignoramos el Enter
                } else {
                    handleNext();
                }
            }
        });
        // ============================

        window.onload = startQuiz;
    </script>
