<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Interactivo: Sistemas de Gestión Empresarial</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #d35400; /* Tono naranja oscuro elegante */
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --background-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }

        .progress {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--secondary-color);
            background: #fdf2e9;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .score {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--success-color);
        }

        h2 {
            font-size: 1.35em;
            margin-bottom: 25px;
            color: var(--primary-color);
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.05em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #fef9f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .option-btn.correct {
            background-color: #eafaf1;
            border-color: var(--success-color);
            color: #1e8449;
            font-weight: 700;
        }

        .option-btn.incorrect {
            background-color: #fceae9;
            border-color: var(--accent-color);
            color: #c0392b;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .justification-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #fcf6f2;
            border-left: 5px solid var(--secondary-color);
            border-radius: 6px;
            font-size: 1.05em;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .justification-box h4 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }

        .next-btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn, .restart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            display: none;
            box-shadow: 0 4px 6px rgba(211, 84, 0, 0.2);
        }

        .next-btn:hover, .restart-btn:hover {
            background-color: #a04000;
            transform: translateY(-2px);
        }

        .restart-btn {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2em;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .results-screen p {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 4em;
            font-weight: 800;
            color: var(--secondary-color);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #quiz-container { padding: 25px 20px; }
            h2 { font-size: 1.2em; }
            .option-btn { font-size: 1em; padding: 14px 15px; }
            .final-score { font-size: 3em; }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="question-screen">
            <div class="header">
                <div class="progress" id="progress">Pregunta 1 de X</div>
                <div class="score" id="score">Puntuación: 0</div>
            </div>
            
            <h2 id="question-text">¿Pregunta?</h2>
            
            <div class="options-container" id="options">
                </div>

            <div class="justification-box" id="justification">
                <h4>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg> 
                    Explicación
                </h4>
                <p id="justification-text"></p>
            </div>

            <div class="next-btn-container">
                <button class="next-btn" id="next-btn" onclick="handleNext()">Siguiente Pregunta</button>
            </div>
        </div>

        <div class="results-screen" id="results-screen">
            <h1>¡Test Completado!</h1>
            <p>Has finalizado el repaso exhaustivo de Sistemas de Gestión Empresarial.</p>
            <div class="final-score" id="final-score">0 / X</div>
            <button class="restart-btn" onclick="startQuiz()">Reintentar Cuestionario Aleatorio</button>
        </div>
    </div>

    <script>
        const rawQuestions = [
            {
                q: "¿Qué características tiene un ERP?",
                options: ["Modularidad, escalabilidad, oportunidad.", "Simplicidad, integración, rigidez.", "Integración, modularidad, adaptabilidad.", "Ninguna respuesta es correcta."],
                correct: "Integración, modularidad, adaptabilidad.",
                justification: "Un ERP engloba toda la actividad, funciona por módulos independientes y se adapta a los requerimientos de la empresa."
            },
            {
                q: "¿Qué palabras se identifican con la lógica operacional de los CRM?",
                options: ["Organizar.", "Automatizar.", "Gestionar.", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "La parte operacional del CRM automatiza y gestiona las ventas, el marketing, el soporte técnico y organiza el call center."
            },
            {
                q: "¿Qué tipo de base de datos es la mejor opción para un sistema de gestión de base de datos de un ERP?",
                options: ["Racional.", "Relacional.", "Multirelacional.", "Multidimensional."],
                correct: "Multidimensional.",
                justification: "Aunque suelen operar en bases de datos relacionales, las multidimensionales se consideran la 'mejor opción' por su alto rendimiento analítico."
            },
            {
                q: "Módulos mínimos instalados en OpenERP:",
                options: ["base.", "web_livechat.", "base_setup.", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "Son los componentes del núcleo que el sistema instala obligatoriamente por defecto."
            },
            {
                q: "En el sistema de instalación _________ se instalan todos los datos y la gestión de estos en un ordenador... instalando una aplicación (cliente) con la que es posible conectarse al ordenador que poseen los datos (servidor).",
                options: ["Cliente-servidor.", "Saas.", "Monopuesto.", "Cliente-servidor Web."],
                correct: "Cliente-servidor.",
                justification: "El servidor centraliza la base de datos y los clientes acceden a ella instalando una aplicación de acceso."
            },
            {
                q: "Para entornos de desarrollo o aprendizaje, ¿qué tipo de instalación es mejor?",
                options: ["SaaS.", "Cliente-servidor.", "Monopuesto.", "Online."],
                correct: "Monopuesto.",
                justification: "No requiere red externa ni afecta a otros usuarios reales, por lo que es ideal para hacer pruebas de desarrollo locales."
            },
            {
                q: "Dependiendo del coste, podemos diferenciar entre diversos tipos de softwares. Identifica los tipos de software según el coste:",
                options: ["Moneyware, Shareware y Rumboware.", "Freeware, Payware y Shareware.", "Rumboware, Freeware y Payware.", "Ninguna de las respuestas es correcta."],
                correct: "Freeware, Payware y Shareware.",
                justification: "Freeware es gratis, Payware es de pago y Shareware es de prueba temporal."
            },
            {
                q: "Es la mínima unidad de estructura de una base de datos. Es el conjunto de registros o filas relacionadas que se almacenan en una base de datos bajo un mismo nombre.",
                options: ["Tabla.", "Fila.", "Columna.", "Ninguna de las respuestas es correcta."],
                correct: "Tabla.",
                justification: "Las tablas son el elemento fundamental de estructuración en bases de datos relacionales, conteniendo filas y columnas."
            },
            {
                q: "¿Qué modalidad de albaranes existen?",
                options: ["Externos.", "De salida.", "De entrada.", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "Los albaranes justifican los movimientos logísticos: de entrada, de salida y externos o internos para moverse entre almacenes o ubicaciones."
            },
            {
                q: "En la gestión de productos, ¿qué productos SÍ que contabilizan en el stock?",
                options: ["Consumible.", "Almacenable.", "Servicio.", "Ninguna de las respuestas es correcta."],
                correct: "Almacenable.",
                justification: "Solo los productos marcados como 'almacenables' llevan un control estricto de inventario en el sistema."
            },
            {
                q: "Es posible estructurar el diseño de las bases de datos relacionales en tres niveles diferentes:",
                options: ["Físico y lógico.", "Físico, lógico y conceptual.", "Físico, lógico o conceptual y externo.", "Ninguna de las respuestas es correcta."],
                correct: "Físico, lógico o conceptual y externo.",
                justification: "Se estructuran en nivel físico (almacenamiento en disco), lógico o conceptual (tablas y restricciones) y externo (vistas del usuario)."
            },
            {
                q: "La gestión de almacén o stock de productos está basada en dos conceptos fundamentales relacionados entre sí, que son:",
                options: ["Ubicación y almacén.", "Albaranes y ubicaciones.", "Ubicaciones físicas y virtuales.", "Ninguna de las respuestas es correcta."],
                correct: "Ubicación y almacén.",
                justification: "El almacén representa el espacio general, mientras que las ubicaciones son los espacios específicos y concretos dentro y fuera de él."
            },
            {
                q: "Es bastante común que se produzcan devoluciones en el proceso de compra-venta de productos y servicios. Para realizar este proceso de manera correcta, es conveniente diferenciar entre dos tipos de casos:",
                options: ["Facturas emitidas y facturas pendientes de emitir.", "Facturas abonadas y facturas no pagadas.", "Facturas emitidas y facturas recibidas.", "Todas las respuestas son correctas."],
                correct: "Facturas abonadas y facturas no pagadas.",
                justification: "Es fundamental distinguir si la factura ya ha sido abonada (requiere factura rectificativa) o si no está pagada (permite su cancelación en borrador)."
            },
            {
                q: "En la metodología de implantación, la fase de desarrollo define:",
                options: ["Instalación y configuración.", "Análisis detallado y diseño del sistema.", "Viabilidad del sistema y especificación funcional.", "Operación normal y mantenimiento."],
                correct: "Análisis detallado y diseño del sistema.",
                justification: "En esta fase (Fase 2) se analiza al detalle y se realiza el diseño lógico y físico sobre papel antes de instalar nada."
            },
            {
                q: "En el plan de formación de la gestión de compra-venta, ¿Cuál es el orden lógico?",
                options: ["Crear orden de compraventa, Crear stock inicial, Crear Categorías de productos.", "Crear Categorías de productos, Crear orden de compraventa, Crear stock inicial.", "Crear Categorías de productos, Crear productos, Crear stock inicial.", "Crear stock inicial, Crear categorías de productos, Crear orden de compraventa."],
                correct: "Crear Categorías de productos, Crear productos, Crear stock inicial.",
                justification: "Primero se define la categoría, luego el producto en sí mismo, y finalmente se le asigna un stock para poder operar con él."
            },
            {
                q: "¿Qué tipo de lenguaje es Python?",
                options: ["Lenguaje compilado y multiplataforma.", "Lenguaje interpretado y multiplataforma.", "Lenguaje compilado.", "Lenguaje interpretado."],
                correct: "Lenguaje interpretado y multiplataforma.",
                justification: "Python no compila un ejecutable binario directamente; es un lenguaje interpretado que funciona en múltiples sistemas operativos."
            },
            {
                q: "En el lenguaje Python:",
                options: ["Las variables locales tienen un determinado valor a lo largo de todo el programa.", "Las variables no necesitan ser definidas (declaradas) para su utilización.", "Las variables necesitan ser definidas (declaradas) para su utilización.", "Las variables globales solo tienen sentido dentro del bloque en el que se inicialicen."],
                correct: "Las variables no necesitan ser definidas (declaradas) para su utilización.",
                justification: "Python usa tipado dinámico, por lo que las variables se inicializan dándoles un valor directamente, sin necesidad de declarar su tipo previamente."
            },
            {
                q: "Dentro del lenguaje Python, ¿qué es el diccionario o tablas hash?",
                options: ["Un conjunto de estructuras que almacenan información mediante clave en lugar de por posición.", "Un conjunto de estructuras que NO almacenan información mediante clave en lugar de por posición.", "Una representación mediante comillas simples o comillas dobles, pero nunca combinando las dos a la vez.", "Ninguna de las respuestas es correcta."],
                correct: "Un conjunto de estructuras que almacenan información mediante clave en lugar de por posición.",
                justification: "Los diccionarios en Python usan pares de clave-valor asociativos, en lugar de utilizar un índice posicional como las listas numéricas."
            },
            {
                q: "¿Cuál de estos usaremos para hacer comentarios en Python?",
                options: ["<>", "//", "!", "#"],
                correct: "#",
                justification: "El símbolo de la almohadilla (#) se utiliza para invalidar y comentar una línea de código desde ese símbolo hasta el final."
            },
            {
                q: "Señala los tipos de herencia que podemos encontrar en el lenguaje de programación Python (en Odoo).",
                options: ["Herencia por extensión.", "Herencia por prototipo.", "Herencia por delegación.", "Todas son correctas."],
                correct: "Todas son correctas.",
                justification: "El ORM de Odoo admite los tres tipos de herencia para extender, copiar o delegar campos a nuevos objetos."
            },
            {
                q: "¿Qué es PostgreSQL?",
                options: ["Es un tipo de base de datos.", "Es un sistema de código abierto de administración de bases de datos de tipo relacional.", "Es un sistema de código abierto de administración de bases de datos de tipo NO relacional.", "Ninguna respuesta es correcta."],
                correct: "Es un sistema de código abierto de administración de bases de datos de tipo relacional.",
                justification: "Es un sistema gestor de bases de datos relacionales (SGBD) libre y maduro, siendo el soportado por defecto por Odoo."
            },
            {
                q: "Permite crear un gráfico de barras o circular partiendo de los campos que se determinen. En este tipo de vista, se pueden realizar agrupaciones sobre los campos...",
                options: ["Vista gráfica.", "Vista de búsqueda.", "Vista formulario.", "Vista en árbol."],
                correct: "Vista gráfica.",
                justification: "La vista gráfica posibilita la creación de cuadros analíticos dinámicos como barras y circulares para hacer sumas o cálculos simples sobre grupos."
            },
            {
                q: "¿Para qué sirven los Sistemas de Gestión de Base de Datos (SGBD)?",
                options: ["Para extraer y manipular datos.", "Para almacenar datos.", "Para darle mayor utilidad a la información que se obtiene de las bases de datos.", "Todas las respuestas son correctas."],
                correct: "Todas las respuestas son correctas.",
                justification: "Un SGBD es el núcleo que maneja las tablas, facilitando la extracción, almacenamiento y utilidad analítica de los registros."
            },
            {
                q: "¿Qué es un ERP?",
                options: ["Lo opuesto a un CRM.", "Es un sistema de planificación de recursos empresariales.", "La incorporación de un determinado sistema informático en los procesos que no están relacionados con la empresa.", "Ninguna de las respuestas es correcta."],
                correct: "Es un sistema de planificación de recursos empresariales.",
                justification: "Enterprise Resource Planning. Es un software de carácter modular que gestiona toda la información empresarial centralizada."
            },
            {
                q: "¿Cuál es la definición de 'Adaptabilidad'?",
                options: ["Gracias a las características de Modularidad e Integración, un ERP se puede adaptar a las distintas necesidades y requerimientos de una determinada empresa.", "Los sistemas ERP abarcan la mayoría de las áreas de una empresa.", "Cada módulo permite gestionar un departamento, y se pueden quitar o poner.", "Ninguna de las respuestas es correcta."],
                correct: "Gracias a las características de Modularidad e Integración, un ERP se puede adaptar a las distintas necesidades y requerimientos de una determinada empresa.",
                justification: "La adaptabilidad es la propiedad que permite que el software se ajuste a las reglas de negocio de la empresa al poseer módulos integrables."
            },
            {
                q: "¿Qué es el SAP Business All-in-One?",
                options: ["Software diseñado para medianas y grandes empresas incorporando una serie de productos básicos y específicos de un determinado sector de una empresa.", "Software que se utiliza para gestiones empresariales que estén basadas en aplicaciones online.", "Todas las respuestas son incorrectas.", "Software que se presenta como una solución muy completa..."],
                correct: "Software diseñado para medianas y grandes empresas incorporando una serie de productos básicos y específicos de un determinado sector de una empresa.",
                justification: "Es una solución específica y preconfigurada de SAP orientada a ese segmento concreto del mercado empresarial."
            },
            {
                q: "¿Cuál es el único ERP que tiene su origen en España y que ha conseguido una gran implantación en todo el mundo?",
                options: ["OpenERP.", "OpenBravo.", "SAP.", "ODOO."],
                correct: "OpenBravo.",
                justification: "OpenBravo nació en el seno de la Universidad de Navarra en España (a pesar de la errata puntual del manual que lo mezcla con Odoo, la respuesta correcta en examen es OpenBravo)."
            },
            {
                q: "¿Qué significa CRM?",
                options: ["Gestión de las Relaciones con el Cliente.", "Significa lo opuesto al concepto de ERP.", "Gestión de las Redes del Cliente.", "Ninguna de las respuestas es correcta."],
                correct: "Gestión de las Relaciones con el Cliente.",
                justification: "Son las siglas en inglés para Customer Relationship Management."
            },
            {
                q: "Dentro de los CRM, con la lógica analítica es posible:",
                options: ["Automatización de ventas, productos y clientes...", "Analizar la información existente para llevar a cabo las diferentes campañas de marketing.", "Organización del 'call center'.", "Gestión de soporte en la empresa."],
                correct: "Analizar la información existente para llevar a cabo las diferentes campañas de marketing.",
                justification: "Mientras la lógica operacional hace las tareas del día a día, la analítica estudia esos datos para modificar y mejorar estrategias."
            },
            {
                q: "Los CRM actuales pueden dividirse en dos categorías, ¿sabes cuáles son?",
                options: ["Integrados e inclusivos.", "Integrados en un sistema ERP y exclusivos.", "Interconectados e inclusivos.", "Exclusivos y interconectados."],
                correct: "Integrados en un sistema ERP y exclusivos.",
                justification: "Pueden venir ya integrados como módulos dentro de la suite del propio ERP, o ser desarrollados de forma exclusiva e independiente (como SugarCRM)."
            },
            {
                q: "¿Los CRM que están ________ se refieren a que pertenecen al mismo ERP, por ejemplo: Odoo?",
                options: ["Exclusivos.", "Formateados.", "Integrados.", "Actualizados."],
                correct: "Integrados.",
                justification: "Se llaman 'integrados' porque pertenecen y se comunican bajo la misma plataforma del proveedor del ERP."
            },
            {
                q: "Una de las principales funciones de un Data Warehouse es:",
                options: ["Elimina aquellos datos que se utilizan en las operaciones cotidianas del almacén de datos.", "Integra los datos de las correspondientes bases de datos distribuidas.", "Los Data Warehouse no existen.", "Ninguna de las otras respuestas es correcta."],
                correct: "Integra los datos de las correspondientes bases de datos distribuidas.",
                justification: "Reúne e integra la información transaccional y la separa de la base de datos operativa diaria para facilitar el análisis estratégico."
            },
            {
                q: "Identifica las funciones que deben realizar las herramientas que permiten controlar y automatizar las necesidades de los Data Warehouse:",
                options: ["Gestión integrada de la extracción, transformación y carga del Data Warehouse.", "Manejo de excepciones y archivos logs.", "Control en el tiempo de respuesta.", "Todas son correctas."],
                correct: "Todas son correctas.",
                justification: "Estas herramientas (ETL) controlan el ciclo completo de Extracción, Transformación y Carga, así como sus excepciones."
            },
            {
                q: "Identifica la función INCORRECTA entre estas funciones que deben realizar las herramientas que permiten controlar y automatizar las necesidades de los Data Warehouse:",
                options: ["Control de acceso.", "Gestión integrada de la extracción, transformación y carga del Data Warehouse.", "Manejo de excepciones y archivos logs.", "Control en el tiempo de respuesta."],
                correct: "Control de acceso.",
                justification: "El control de acceso es una política de seguridad nativa de la Base de Datos subyacente, no una función directa de las herramientas ETL del Data Warehouse."
            },
            {
                q: "A la hora de elegir un ERP, es preciso tener en cuenta una serie de factores. ¿Cuál de los siguientes NO es uno de esos factores?",
                options: ["Que proporcione informes y análisis, además de implementar su seguridad.", "Que sea lento y difícil de uso.", "Que ofrezca soporte a todas las áreas que necesite la empresa.", "Todas las respuestas son correctas."],
                correct: "Que sea lento y difícil de uso.",
                justification: "Las empresas buscan características exactamente opuestas: rapidez y facilidad de uso y adaptación."
            },
            {
                q: "Cuando se trabaja con software industrial, debe existir un contrato entre el creador y el comprador, denominado licencia. ¿Qué es?",
                options: ["Es un número que facilita el cliente al desarrollador para usar un servicio.", "Es un documento que detalla una serie de obligaciones que debe tener el desarrollador con el usuario en cuestión, y viceversa.", "Ninguna de las respuestas es correcta.", "Un documento que solo impone obligaciones al usuario."],
                correct: "Es un documento que detalla una serie de obligaciones que debe tener el desarrollador con el usuario en cuestión, y viceversa.",
                justification: "Es un contrato vinculante bidireccional que establece los derechos, obligaciones, modificación y distribución del código."
            },
            {
                q: "Identifica las licencias de código abierto permisivas:",
                options: ["Apache.", "BSD.", "MIT.", "Todas son correctas."],
                correct: "Todas son correctas.",
                justification: "Estas tres son los clásicos ejemplos de licencias libres permisivas (con muy pocas restricciones para el usuario)."

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Función para barajar elementos de un array
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startQuiz() {
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            
            // Copia profunda
            quizData = JSON.parse(JSON.stringify(rawQuestions));
            
            // 1) Barajar preguntas
            quizData = shuffleArray(quizData);
            
            // 2) Barajar opciones
            quizData.forEach(q => {
                q.options = shuffleArray(q.options);
            });

            currentQuestionIndex = 0;
            score = 0;
            updateUI();
            renderQuestion();
        }

        function updateUI() {
            document.getElementById('progress').innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
            document.getElementById('score').innerText = `Aciertos: ${score}`;
        }

        function renderQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = ''; 

            document.getElementById('justification').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            currentQ.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => selectOption(option, currentQ.correct, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selected, correct, btnElement) {
            const currentQ = quizData[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            // Bloqueo de opciones
            allBtns.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correct) {
                    btn.classList.add('correct');
                }
            });

            // Verificar acierto
            if (selected === correct) {
                score++;
                updateUI();
            } else {
                btnElement.classList.add('incorrect');
            }

            // Explicación
            document.getElementById('justification-text').innerText = currentQ.justification;
            document.getElementById('justification').style.display = 'block';

            // Siguiente
            document.getElementById('next-btn').style.display = 'inline-block';
            
            if (currentQuestionIndex === quizData.length - 1) {
                document.getElementById('next-btn').innerText = 'Ver Calificación Final';
            } else {
                document.getElementById('next-btn').innerText = 'Siguiente Pregunta';
            }
        }

        function handleNext() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                updateUI();
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        }

        // Iniciar
        window.onload = startQuiz;
