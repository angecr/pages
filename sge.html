<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Completo: Sistemas de Gestión Empresarial (72 Preguntas)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #2980b9;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --background-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }

        .progress {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--secondary-color);
            background: #eef2f5;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .score {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--success-color);
        }

        h2 {
            font-size: 1.35em;
            margin-bottom: 25px;
            color: var(--primary-color);
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.05em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #f4f8fb;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .option-btn.correct {
            background-color: #eafaf1;
            border-color: var(--success-color);
            color: #1e8449;
            font-weight: 700;
        }

        .option-btn.incorrect {
            background-color: #fceae9;
            border-color: var(--accent-color);
            color: #c0392b;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .justification-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f0f7fb;
            border-left: 5px solid var(--secondary-color);
            border-radius: 6px;
            font-size: 1.05em;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .justification-box h4 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }

        .next-btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn, .restart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            display: none;
            box-shadow: 0 4px 6px rgba(41, 128, 185, 0.2);
        }

        .next-btn:hover, .restart-btn:hover {
            background-color: #1f6391;
            transform: translateY(-2px);
        }

        .restart-btn {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2em;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .results-screen p {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 4em;
            font-weight: 800;
            color: var(--secondary-color);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #quiz-container { padding: 25px 20px; }
            h2 { font-size: 1.2em; }
            .option-btn { font-size: 1em; padding: 14px 15px; }
            .final-score { font-size: 3em; }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <!-- Pantalla de la Pregunta -->
        <div id="question-screen">
            <div class="header">
                <div class="progress" id="progress">Pregunta 1 de X</div>
                <div class="score" id="score">Puntuación: 0</div>
            </div>
            
            <h2 id="question-text">¿Pregunta?</h2>
            
            <div class="options-container" id="options">
                <!-- Los botones se insertan por JS -->
            </div>

            <div class="justification-box" id="justification">
                <h4>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg> 
                    Explicación
                </h4>
                <p id="justification-text"></p>
            </div>

            <div class="next-btn-container">
                <button class="next-btn" id="next-btn" onclick="handleNext()">Siguiente Pregunta</button>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div class="results-screen" id="results-screen">
            <h1>¡Test Completado!</h1>
            <p>Has finalizado el repaso exhaustivo de Sistemas de Gestión Empresarial.</p>
            <div class="final-score" id="final-score">0 / X</div>
            <button class="restart-btn" onclick="startQuiz()">Reintentar Cuestionario Aleatorio</button>
        </div>
    </div>

    <script>
        // Array masivo con las 72 preguntas proporcionadas
        const rawQuestions = [
            {
                q: "¿Qué es un ERP?",
                options: [
                    "Es un sistema de planificación de recursos empresariales.",
                    "Es un lenguaje de programación para crear módulos comerciales.",
                    "Es un sistema puramente analítico separado de las transacciones.",
                    "Es una base de datos relacional para el soporte técnico."
                ],
                correct: "Es un sistema de planificación de recursos empresariales.",
                justification: "Es un software de carácter modular que gestiona toda la información de una empresa, mejorando su rendimiento, operatividad y eficiencia."
            },
            {
                q: "¿Qué características tiene un ERP?",
                options: [
                    "Integración, modularidad, adaptabilidad.",
                    "Seguridad, exclusividad, estanqueidad.",
                    "Velocidad, monopuesto, analítica.",
                    "Rigidez, modularidad, relacional."
                ],
                correct: "Integración, modularidad, adaptabilidad.",
                justification: "Engloba toda la actividad, funciona por módulos independientes y se adapta a los requerimientos de la empresa."
            },
            {
                q: "¿Cuál es la definición de 'Adaptabilidad' en el entorno ERP?",
                options: [
                    "Gracias a las características de Modularidad e Integración, un ERP se puede adaptar a las distintas necesidades y requerimientos de una determinada empresa.",
                    "Permite adaptar el hardware del cliente al software obligatoriamente.",
                    "Es la capacidad de traducir automáticamente el código fuente a distintos idiomas.",
                    "Es la adaptación obligatoria de la empresa a las rigideces del software."
                ],
                correct: "Gracias a las características de Modularidad e Integración, un ERP se puede adaptar a las distintas necesidades y requerimientos de una determinada empresa.",
                justification: "El ERP se ajusta al modelo de negocio de la organización y no al revés."
            },
            {
                q: "¿Cuál de las siguientes opciones se puede gestionar dentro de un sistema ERP-CRM?",
                options: [
                    "Todas las respuestas son correctas (Recursos humanos, Marketing, Gestión de Almacenes, Gestión de usuarios).",
                    "Solo Gestión de Almacenes y Facturación.",
                    "Únicamente el Marketing y las Campañas Publicitarias.",
                    "Solo los Recursos Humanos y Nóminas."
                ],
                correct: "Todas las respuestas son correctas (Recursos humanos, Marketing, Gestión de Almacenes, Gestión de usuarios).",
                justification: "Su propiedad de 'integración' abarca a todas las áreas operativas de una empresa."
            },
            {
                q: "¿Qué es el SAP Business All-in-One?",
                options: [
                    "Software diseñado para medianas y grandes empresas incorporando una serie de productos básicos y específicos de un determinado sector de una empresa.",
                    "Es un Data Warehouse exclusivo para pequeñas empresas (pymes).",
                    "Es un módulo de Odoo diseñado específicamente para recursos humanos.",
                    "Es un sistema operativo de licencia libre y abierta."
                ],
                correct: "Software diseñado para medianas y grandes empresas incorporando una serie de productos básicos y específicos de un determinado sector de una empresa.",
                justification: "Es la solución preconfigurada de SAP para este segmento del mercado."
            },
            {
                q: "¿Cuál es el único ERP que tiene su origen en España y que ha conseguido una gran implantación en todo el mundo?",
                options: ["OpenBravo.", "SAP.", "Oracle.", "Microsoft Dynamics."],
                correct: "OpenBravo.",
                justification: "OpenBravo es la principal alternativa libre frente a SAP o Microsoft, naciendo con raíces españolas y expandiéndose globalmente."
            },
            {
                q: "¿Qué significa CRM?",
                options: [
                    "Gestión de las Relaciones con el Cliente.",
                    "Sistema de Control de Recursos Materiales.",
                    "Centro de Retención de Marketing.",
                    "Gestión de Redes Multiplataforma."
                ],
                correct: "Gestión de las Relaciones con el Cliente.",
                justification: "Sus siglas responden a Customer Relationship Management."
            },
            {
                q: "¿Qué palabras se identifican con la lógica operacional de los CRM?",
                options: [
                    "Todas las respuestas son correctas (Organizar, Automatizar, Gestionar).",
                    "Exclusivamente 'Analizar'.",
                    "Solo 'Vender' y 'Comprar'.",
                    "Solo 'Extraer', 'Transformar', 'Cargar'."
                ],
                correct: "Todas las respuestas son correctas (Organizar, Automatizar, Gestionar).",
                justification: "La parte operacional del CRM automatiza y gestiona las ventas, el marketing y el soporte técnico."
            },
            {
                q: "Dentro de los CRM, con la lógica analítica es posible:",
                options: [
                    "Analizar la información existente para llevar a cabo las diferentes campañas de marketing.",
                    "Enviar correos electrónicos manuales uno por uno a los clientes.",
                    "Restringir el acceso a los módulos de contabilidad.",
                    "Conectar directamente el hardware a la base de datos de producción."
                ],
                correct: "Analizar la información existente para llevar a cabo las diferentes campañas de marketing.",
                justification: "La lógica analítica estudia los datos del cliente para modificar o crear nuevas estrategias comerciales."
            },
            {
                q: "Los CRM actuales pueden dividirse en dos categorías, ¿sabes cuáles son?",
                options: [
                    "Integrados en un sistema ERP y exclusivos.",
                    "Básicos y Avanzados.",
                    "Analíticos y Relacionales.",
                    "De código abierto y De dominio público."
                ],
                correct: "Integrados en un sistema ERP y exclusivos.",
                justification: "Pueden venir dentro del propio ERP (como el de SAP u Odoo) o ser desarrollados de forma independiente y autónoma (exclusivos)."
            },
            {
                q: "¿Los CRM que están ________ se refieren a que pertenecen al mismo ERP, por ejemplo: Odoo?",
                options: ["Integrados.", "Exclusivos.", "Analíticos.", "Distribuidos."],
                correct: "Integrados.",
                justification: "Son módulos que los mismos fabricantes del ERP incluyen nativamente en su suite de software."
            },
            {
                q: "Una de las principales funciones de un Data Warehouse es:",
                options: [
                    "Integra los datos de las correspondientes bases de datos distribuidas.",
                    "Eliminar los datos antiguos directamente del ERP diario.",
                    "Funcionar como interfaz gráfica exclusiva de Odoo.",
                    "Reemplazar al servidor web."
                ],
                correct: "Integra los datos de las correspondientes bases de datos distribuidas.",
                justification: "Reúne la información transaccional separándola de las operaciones cotidianas para facilitar el análisis a largo plazo."
            },
            {
                q: "Identifica las funciones que deben realizar las herramientas que permiten controlar y automatizar las necesidades de los Data Warehouse:",
                options: [
                    "Todas son correctas (Gestión integrada de la extracción, transformación y carga, Manejo de excepciones y archivos logs, Control en el tiempo de respuesta).",
                    "Solo la extracción de datos.",
                    "Control de acceso y auditoría de contraseñas.",
                    "Diseño exclusivo de vistas y formularios HTML."
                ],
                correct: "Todas son correctas (Gestión integrada de la extracción, transformación y carga, Manejo de excepciones y archivos logs, Control en el tiempo de respuesta).",
                justification: "Estas herramientas controlan integralmente el flujo ETL (Extracción, Transformación y Carga) para nutrir de datos al almacén."
            },
            {
                q: "Identifica la función INCORRECTA entre las herramientas de automatización de los Data Warehouse:",
                options: [
                    "Control de acceso.",
                    "Manejo de excepciones y archivos logs.",
                    "Gestión integrada de la extracción, transformación y carga.",
                    "Control en el tiempo de respuesta."
                ],
                correct: "Control de acceso.",
                justification: "El control de acceso es propio de la seguridad de la Base de Datos nativa, no de las herramientas de automatización y extracción del Data Warehouse (ETL)."
            },
            {
                q: "A la hora de elegir un ERP, es preciso tener en cuenta una serie de factores. ¿Cuál NO es uno de esos factores?",
                options: [
                    "Que sea lento y difícil de uso.",
                    "Que proporcione informes y análisis.",
                    "Que implemente seguridad.",
                    "Que ofrezca soporte a todas las áreas que necesite la empresa."
                ],
                correct: "Que sea lento y difícil de uso.",
                justification: "Se busca exactamente lo contrario: que sea fácil y rápido en su uso, ofrezca seguridad y soporte general a toda la empresa."
            },
            {
                q: "Cuando se trabaja con software, debe existir un contrato entre el creador y el comprador, denominado licencia. ¿Qué es?",
                options: [
                    "Es un documento que detalla una serie de obligaciones que debe tener el desarrollador con el usuario en cuestión, y viceversa. Según el tipo, establece posibilidades de utilización, modificación y distribución.",
                    "Es el archivo ejecutable que permite instalar el ERP en Windows.",
                    "Es la restricción física (USB) obligatoria que necesita el servidor.",
                    "Es un archivo de registro (log) que monitoriza los errores del usuario."
                ],
                correct: "Es un documento que detalla una serie de obligaciones que debe tener el desarrollador con el usuario en cuestión, y viceversa. Según el tipo, establece posibilidades de utilización, modificación y distribución.",
                justification: "La licencia regula legalmente el uso del código, determinando los derechos del desarrollador y del cliente final."
            },
            {
                q: "Identifica los tipos de software según su coste:",
                options: [
                    "Freeware, Payware y Shareware.",
                    "Código abierto, Dominio público y Propietario.",
                    "Windows, Linux y MacOS.",
                    "Local, Cliente-Servidor y SaaS."
                ],
                correct: "Freeware, Payware y Shareware.",
                justification: "Clasificados puramente por el factor económico: Freeware (gratis), Payware (pago obligatorio) y Shareware (prueba temporal o con limitaciones)."
            },
            {
                q: "Si clasificamos el coste económico... ¿Qué es el Shareware?",
                options: [
                    "Durante un periodo de tiempo, el software puede usarse sin coste alguno. Pasado cierto tiempo, para poder continuar usándolo, se debe realizar un pago.",
                    "Es un software de uso totalmente gratuito de por vida.",
                    "Exige un pago previo antes de poder ser descargado.",
                    "Es el software cuyo código puede ser modificado y distribuido sin restricciones."
                ],
                correct: "Durante un periodo de tiempo, el software puede usarse sin coste alguno. Pasado cierto tiempo, para poder continuar usándolo, se debe realizar un pago.",
                justification: "Es un modelo de evaluación o prueba comercial (trial period)."
            },
            {
                q: "Identifica las licencias de código abierto permisivas:",
                options: [
                    "Todas son correctas (Apache, BSD, MIT).",
                    "Únicamente Apache.",
                    "Únicamente GNU/GPL.",
                    "Windows Pro y Enterprise."
                ],
                correct: "Todas son correctas (Apache, BSD, MIT).",
                justification: "Son licencias que no tienen casi limitaciones para la utilización, comercialización o modificación del código fuente."
            },
            {
                q: "En el sistema de instalación _______ se instalan todos los datos y la gestión en un ordenador, permitiendo conectarse desde distintos puntos instalando una aplicación (cliente).",
                options: [
                    "Cliente-servidor.",
                    "Monopuesto.",
                    "SaaS.",
                    "Peer-to-Peer."
                ],
                correct: "Cliente-servidor.",
                justification: "El servidor centraliza la base de datos y la lógica, mientras que los clientes acceden a ella en red local o externa."
            },
            {
                q: "El sistema de instalación _______ realiza la instalación en un ordenador, de tal forma que solo va a tener acceso al sistema el propietario del ordenador físico.",
                options: [
                    "Monopuesto.",
                    "Cliente-servidor.",
                    "SaaS.",
                    "Virtualizado."
                ],
                correct: "Monopuesto.",
                justification: "Base de datos, aplicación y cliente residen en la misma máquina local; nadie externo puede conectarse."
            },
            {
                q: "Para entornos de desarrollo o aprendizaje, ¿qué tipo de instalación es mejor?",
                options: [
                    "Monopuesto.",
                    "Cliente-servidor.",
                    "SaaS.",
                    "Cloud Computing."
                ],
                correct: "Monopuesto.",
                justification: "No requiere infraestructura de red ni afecta a la base de datos productiva de otros usuarios; es ideal para hacer pruebas de código locales."
            },
            {
                q: "La gestión de usuarios de un sistema _________ tiene entre las funciones más importantes la creación, mantenimiento y borrado de usuarios:",
                options: [
                    "ERP-CRM.",
                    "Data Warehouse.",
                    "Base de datos.",
                    "Sistema Operativo."
                ],
                correct: "ERP-CRM.",
                justification: "El administrador del ERP gestiona los perfiles, altas, bajas y permisos específicos de los empleados y roles de la empresa."
            },
            {
                q: "Módulos mínimos instalados en OpenERP (Odoo):",
                options: [
                    "Todas las respuestas son correctas (base, web_livechat, base_setup).",
                    "Solo 'base'.",
                    "Ventas, Compras y Contabilidad.",
                    "Marketing y Recursos Humanos."
                ],
                correct: "Todas las respuestas son correctas (base, web_livechat, base_setup).",
                justification: "Son los componentes del núcleo técnico (core) que el sistema instala obligatoriamente por defecto al crear una base de datos."
            },
            {
                q: "¿Qué tipo de base de datos es la mejor opción para un sistema de gestión de base de datos de un ERP?",
                options: [
                    "Multidimensional.",
                    "Relacional.",
                    "Plana (.txt).",
                    "Basada en grafos."
                ],
                correct: "Multidimensional.",
                justification: "Aunque Odoo opera sobre relacionales (PostgreSQL), la teoría del curso cita a las BD multidimensionales como la 'mejor opción' teórica por su rendimiento analítico superior."
            },
            {
                q: "¿Con qué Base de datos trabaja nativamente OpenERP (Odoo)?",
                options: ["PostgreSQL.", "MySQL.", "Oracle.", "SQL Server."],
                correct: "PostgreSQL.",
                justification: "Es el motor relacional de código abierto que Odoo utiliza obligatoriamente como soporte para todas sus versiones."
            },
            {
                q: "¿Qué es PostgreSQL?",
                options: [
                    "Es un sistema de código abierto de administración de bases de datos de tipo relacional.",
                    "Es un módulo de Odoo para diseño de informes.",
                    "Es un lenguaje de programación orientado a objetos.",
                    "Es un sistema de bases de datos de tipo NO relacional (NoSQL)."
                ],
                correct: "Es un sistema de código abierto de administración de bases de datos de tipo relacional.",
                justification: "Es un SGBD robusto, fiable y de código abierto utilizado mundialmente como soporte de datos."
            },
            {
                q: "Los sistemas relacionales deben cumplir una serie de propiedades básicas. Indica cuál es:",
                options: [
                    "Debe ser un sistema capaz de eliminar la redundancia entre sus datos para poder asegurar la coherencia entre todos.",
                    "Debe ser un sistema capaz de crear redundancia intencionada en los datos.",
                    "Debe permitir registros huérfanos sin claves primarias.",
                    "Debe asegurar que los datos nunca puedan borrarse."
                ],
                correct: "Debe ser un sistema capaz de eliminar la redundancia entre sus datos para poder asegurar la coherencia entre todos.",
                justification: "Esto se conoce como la propiedad de 'Integridad' o normalización de la base de datos."
            },
            {
                q: "¿Cuál de las siguientes características NO es una propiedad de un sistema relacional?",
                options: ["Escalaridad.", "Integridad.", "Compartición.", "Seguridad."],
                correct: "Escalaridad.",
                justification: "Las propiedades básicas relacionales son integridad, compartición, seguridad y protección contra fallos. La escalaridad pertenece más a la arquitectura del hardware/software."
            },
            {
                q: "Es posible estructurar el diseño de las bases de datos relacionales en tres niveles diferentes:",
                options: [
                    "Físico, Lógico o Conceptual y Externo.",
                    "Físico, Abstracto y Virtual.",
                    "Frontend, Backend y BD.",
                    "Primario, Secundario y Terciario."
                ],
                correct: "Físico, Lógico o Conceptual y Externo.",
                justification: "Según ANSI-SPARC: Físico (almacenamiento en disco), Lógico (esquema de tablas) y Externo (vistas del usuario)."
            },
            {
                q: "¿Qué permite el nivel lógico o conceptual?",
                options: [
                    "Permite crear una estructura en los datos mediante tablas y restricciones de integridad y claves primarias.",
                    "Permite establecer las rutas de guardado en el disco duro.",
                    "Permite el diseño exclusivo de la interfaz gráfica (colores).",
                    "Determina los voltajes de lectura/escritura de los datos físicos."
                ],
                correct: "Permite crear una estructura en los datos mediante tablas y restricciones de integridad y claves primarias.",
                justification: "Es el nivel intermedio donde el diseñador define el esquema relacional, los campos y cómo se asocian entre sí."
            },
            {
                q: "Unidad mínima de información que puede almacenar un ordenador y que se corresponde con una información, no con un tamaño:",
                options: ["Dato.", "Registro.", "Byte.", "Tabla."],
                correct: "Dato.",
                justification: "En el contexto de la gestión de información, el 'dato' es la unidad atómica conceptual; un hecho puntual."
            },

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Algoritmo de Fisher-Yates para barajar
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Inicializar
        function startQuiz() {
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            
            // Copia profunda
            quizData = JSON.parse(JSON.stringify(rawQuestions));
            
            // 1) Barajar las preguntas
            quizData = shuffleArray(quizData);
            
            // 2) Barajar las opciones de CADA pregunta
            quizData.forEach(q => {
                q.options = shuffleArray(q.options);
            });

            currentQuestionIndex = 0;
            score = 0;
            updateUI();
            renderQuestion();
        }

        function updateUI() {
            document.getElementById('progress').innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
            document.getElementById('score').innerText = `Aciertos: ${score}`;
        }

        function renderQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = ''; 

            document.getElementById('justification').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            currentQ.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => selectOption(option, currentQ.correct, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selected, correct, btnElement) {
            const currentQ = quizData[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            // Bloquea opciones tras la elección
            allBtns.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correct) {
                    btn.classList.add('correct');
                }
            });

            if (selected === correct) {
                score++;
                updateUI();
            } else {
                btnElement.classList.add('incorrect');
            }

            // Explicación
            document.getElementById('justification-text').innerText = currentQ.justification;
            document.getElementById('justification').style.display = 'block';

            // Mostrar el botón Siguiente
            document.getElementById('next-btn').style.display = 'inline-block';
            
            if (currentQuestionIndex === quizData.length - 1) {
                document.getElementById('next-btn').innerText = 'Ver Nota Final';
            } else {
                document.getElementById('next-btn').innerText = 'Siguiente Pregunta';
            }
        }

        function handleNext() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                updateUI();
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        }

        // Arranca nada más abrir
        window.onload = startQuiz;
