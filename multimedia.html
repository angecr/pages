<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Interactivo: Android Studio y Unity</title>
    <style>
        :root {
            --primary-color: #2b3a42;
            --secondary-color: #3DDC84; /* Android Green */
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --background-color: #e0e5ec;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .progress {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--primary-color);
        }

        h2 {
            font-size: 1.4em;
            margin-bottom: 25px;
            color: var(--primary-color);
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1.05em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #f0fdf4;
        }

        .option-btn.correct {
            background-color: #eafaf1;
            border-color: var(--success-color);
            color: #1e8449;
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: #fceae9;
            border-color: var(--accent-color);
            color: #c0392b;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .justification-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f4fdf8;
            border-left: 5px solid var(--secondary-color);
            border-radius: 4px;
            font-size: 1.05em;
            line-height: 1.5;
            animation: fadeIn 0.5s ease;
        }

        .justification-box h4 {
            color: var(--primary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .next-btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn, .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover, .restart-btn:hover {
            background-color: #1a252a;
        }

        .restart-btn {
            display: inline-block;
            margin-top: 20px;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h1 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .results-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 3em;
            font-weight: bold;
            color: var(--secondary-color);
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #quiz-container { padding: 25px 20px; }
            h2 { font-size: 1.2em; }
            .option-btn { font-size: 1em; padding: 12px 15px; }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <!-- Pantalla de la Pregunta -->
        <div id="question-screen">
            <div class="header">
                <div class="progress" id="progress">Pregunta 1 de X</div>
                <div class="score" id="score">Puntuación: 0</div>
            </div>
            
            <h2 id="question-text">¿Pregunta?</h2>
            
            <div class="options-container" id="options"></div>

            <div class="justification-box" id="justification">
                <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg> Explicación</h4>
                <p id="justification-text"></p>
            </div>

            <div class="next-btn-container">
                <button class="next-btn" id="next-btn" onclick="handleNext()">Siguiente Pregunta</button>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div class="results-screen" id="results-screen">
            <h1>¡Cuestionario Completado!</h1>
            <p>Has finalizado el test de Android y Unity.</p>
            <div class="final-score" id="final-score">0 / X</div>
            <button class="restart-btn" onclick="startQuiz()">Reintentar Cuestionario (Aleatorio)</button>
        </div>
    </div>

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Mezclar array (Fisher-Yates)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Iniciar Quiz
        function startQuiz() {
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            
            // Clonar las preguntas
            quizData = JSON.parse(JSON.stringify(rawQuestions));
            
            // Aleatorizar preguntas
            quizData = shuffleArray(quizData);
            
            // Aleatorizar opciones de respuesta
            quizData.forEach(q => {
                q.options = shuffleArray(q.options);
            });

            currentQuestionIndex = 0;
            score = 0;
            updateUI();
            renderQuestion();
        }

        function updateUI() {
            document.getElementById('progress').innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
            document.getElementById('score').innerText = `Aciertos: ${score}`;
        }

        function renderQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = ''; 

            document.getElementById('justification').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            currentQ.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => selectOption(option, currentQ.correct, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selected, correct, btnElement) {
            const currentQ = quizData[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            // Bloquear botones
            allBtns.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correct) {
                    btn.classList.add('correct');
                }
            });

            // Verificar si acertó
            if (selected === correct) {
                score++;
                updateUI();
            } else {
                btnElement.classList.add('incorrect');
            }

            // Mostrar Justificación
            document.getElementById('justification-text').innerText = currentQ.justification;
            document.getElementById('justification').style.display = 'block';

            // Mostrar botón Siguiente
            document.getElementById('next-btn').style.display = 'inline-block';
            
            if (currentQuestionIndex === quizData.length - 1) {
                document.getElementById('next-btn').innerText = 'Ver Resultados';
            } else {
                document.getElementById('next-btn').innerText = 'Siguiente Pregunta';
            }
        }

        function handleNext() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                updateUI();
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        }

        // Iniciar
        window.onload = startQuiz;

    </script>
