<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Interactivo: Android Studio y Unity</title>
    <style>
        :root {
            --primary-color: #073042;        /* Android dark navy (branding) */
            --secondary-color: #3DDC84;      /* Android Green (acción) */
            --secondary-dark: #2bbf6c;       /* Verde Android oscurecido para hover */
            --accent-color: #EA4335;         /* Google red (incorrecto) */
            --success-color: #34A853;        /* Google green (acierto) */
            --background-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #202124;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }

        .progress {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--secondary-dark);
            background: #e8f9ef;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .score {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--success-color);
        }

        h2 {
            font-size: 1.35em;
            margin-bottom: 25px;
            color: var(--primary-color);
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 1.05em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            min-width: 30px;
            border-radius: 6px;
            background-color: #eef4f0;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 0.95em;
            border: 1px solid #dcdde1;
            transition: all 0.2s ease;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .option-text {
            flex: 1;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #f3fdf7;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .option-btn.pre-selected {
            border-color: var(--primary-color);
            background-color: #e6eef3;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(7, 48, 66, 0.18);
        }

        .option-btn.pre-selected .option-number {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .option-btn.correct {
            background-color: #e8f6ee;
            border-color: var(--success-color);
            color: #1e7e34;
            font-weight: 700;
        }

        .option-btn.correct .option-number {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.incorrect {
            background-color: #fdecea;
            border-color: var(--accent-color);
            color: #b3261e;
        }

        .option-btn.incorrect .option-number {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .keyboard-hint {
            margin-top: 18px;
            padding: 10px 14px;
            background-color: #f5f7fa;
            border-radius: 8px;
            font-size: 0.85em;
            color: #5f6368;
            text-align: center;
            border: 1px dashed #dcdde1;
        }

        .keyboard-hint kbd {
            display: inline-block;
            padding: 2px 8px;
            background: white;
            border: 1px solid #bdc3c7;
            border-bottom-width: 2px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: var(--primary-color);
            font-weight: 700;
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            margin: 0 2px;
        }

        .justification-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f1fbf5;
            border-left: 5px solid var(--secondary-color);
            border-radius: 6px;
            font-size: 1.05em;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .justification-box h4 {
            color: var(--secondary-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }

        .next-btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn, .restart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            display: none;
            box-shadow: 0 4px 6px rgba(61, 220, 132, 0.3);
        }

        .next-btn:hover, .restart-btn:hover {
            background-color: var(--secondary-dark);
            transform: translateY(-2px);
        }

        .next-btn .kbd-inline {
            display: inline-block;
            padding: 1px 7px;
            background: rgba(255,255,255,0.22);
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85em;
            margin-left: 8px;
            font-weight: 700;
        }

        .restart-btn {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2em;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .results-screen p {
            font-size: 1.2em;
            color: #5f6368;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 4em;
            font-weight: 800;
            color: var(--secondary-dark);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #quiz-container { padding: 25px 20px; }
            h2 { font-size: 1.2em; }
            .option-btn { font-size: 1em; padding: 12px 14px; }
            .option-number { width: 26px; height: 26px; min-width: 26px; font-size: 0.85em; }
            .final-score { font-size: 3em; }
            .keyboard-hint { font-size: 0.78em; }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <!-- Pantalla de la Pregunta -->
        <div id="question-screen">
            <div class="header">
                <div class="progress" id="progress">Pregunta 1 de X</div>
                <div class="score" id="score">Puntuación: 0</div>
            </div>
            
            <h2 id="question-text">¿Pregunta?</h2>
            
            <div class="options-container" id="options"></div>

            <div class="justification-box" id="justification">
                <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg> Explicación</h4>
                <p id="justification-text"></p>
            </div>

            <div class="keyboard-hint">
                <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> o <kbd>↑</kbd> <kbd>↓</kbd> para seleccionar · <kbd>Enter</kbd> para confirmar y avanzar
            </div>

            <div class="next-btn-container">
                <button class="next-btn" id="next-btn" onclick="handleNext()">Siguiente Pregunta<span class="kbd-inline">Enter</span></button>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div class="results-screen" id="results-screen">
            <h1>¡Cuestionario Completado!</h1>
            <p>Has finalizado el test de Android y Unity.</p>
            <div class="final-score" id="final-score">0 / X</div>
            <button class="restart-btn" onclick="startQuiz()">Reintentar Cuestionario (Aleatorio)</button>
        </div>
    </div>

    <script>
        const rawQuestions = [
            {
                q: "¿Qué significan las siglas ADB?",
                options: ["Android Virtual Device.", "Android Debugger Bridge.", "Android Runtime.", "Android Debug Bridge."],
                correct: "Android Debug Bridge.",
                justification: "Es una herramienta de línea de comandos que actúa como puente de comunicación para depurar e instalar aplicaciones entre el ordenador y el dispositivo."
            },
            {
                q: "¿Qué es un sp?",
                options: ["Es una medida especial, solo para Java.", "Es una medida estándar, un píxel virtual que se adaptará a cada densidad de pantalla.", "Tienen la misma función que los dp, la diferencia es que se aplican a textos.", "Es un punto que emite un solo color en una imagen o en una pantalla."],
                correct: "Tienen la misma función que los dp, la diferencia es que se aplican a textos.",
                justification: "Los 'sp' (píxeles escalables) adaptan su tamaño no solo a la densidad de la pantalla, sino también a la configuración de tamaño de fuente que el usuario tenga en su teléfono."
            },
            {
                q: "¿Qué es un dp?",
                options: ["Es una medida especial, solo para Java.", "Es una medida estándar, un píxel virtual que se adaptará a cada densidad de pantalla.", "Tienen la misma función que los dp, la diferencia es que se aplican a textos.", "Es un punto que emite un solo color en una imagen o en una pantalla."],
                correct: "Es una medida estándar, un píxel virtual que se adaptará a cada densidad de pantalla.",
                justification: "Los 'dp' aseguran que los elementos visuales (como los márgenes y botones) mantengan sus proporciones sin importar la resolución del móvil."
            },
            {
                q: "¿Qué protocolo se usa para visualizar audios y vídeos en internet?",
                options: ["TCP.", "FTP.", "RTP.", "HTP."],
                correct: "RTP.",
                justification: "RTP (Real-Time Transport Protocol) es el protocolo de red diseñado para el streaming y transmisión en tiempo real de flujos de audio y vídeo."
            },
            {
                q: "¿Cuál es la forma de ajustar tamaños? (valores)",
                options: ["sp para márgenes y dp para letras.", "Ninguna de las respuestas es correcta.", "Wrap_content y match_parent.", "sp para letra y dp para márgenes y paddings."],
                correct: "sp para letra y dp para márgenes y paddings.",
                justification: "Es la buena práctica en Android: 'sp' para las fuentes tipográficas por su escalabilidad, y 'dp' para elementos de interfaz como los contenedores."
            },
            {
                q: "¿Qué hace el siguiente código? fbbd=FirebaseDatabase.getInstance()",
                options: ["Llama a la raíz de la base de datos de Firebase.", "Ninguna de las respuestas es correcta.", "Hacer referencia a la base de datos de MySql.", "Hace referencia al primer nodo de la base de datos de Firebase."],
                correct: "Llama a la raíz de la base de datos de Firebase.",
                justification: "Este método devuelve la instancia principal de conexión con la base de datos Realtime Database."
            },
            {
                q: "¿Para qué se utiliza VolumeShaper?",
                options: ["Para conectarnos a los dispositivos y enviar comandos de la reproducción.", "Para el enrutado de audio o vídeo hacia dispositivos externos.", "Para insertar atenuaciones de volumen al comienzo, al final o de transición entre clips de audio.", "Todas las respuestas son correctas."],
                correct: "Para insertar atenuaciones de volumen al comienzo, al final o de transición entre clips de audio.",
                justification: "VolumeShaper permite dibujar curvas dinámicas de sonido, útiles para hacer efectos automáticos como 'fade-in' o 'fade-out'."
            },
            {
                q: "¿Cuál de las clases multimedia nos permite mezclar sonidos y establecer propiedades para hacerlos simultáneos?",
                options: ["Surface.", "Exoplayer.", "MediaRecorder.", "SoundPool."],
                correct: "SoundPool.",
                justification: "SoundPool gestiona una colección de audios cortos en la memoria y permite reproducirlos a la vez sin retardo."
            },
            {
                q: "La información que contiene la parte de programación en Kotlin se guarda en ficheros con extensión:",
                options: [".java.", ".kt.", ".kot.", "Todas las respuestas son correctas."],
                correct: ".kt.",
                justification: ".kt es la extensión de archivo oficial establecida para el lenguaje Kotlin."
            },
            {
                q: "Para definir el ancho total de la vista de un layout usaremos:",
                options: ["ConstraitLayout.", "wrap_parent.", "wrap_content.", "match_parent."],
                correct: "match_parent.",
                justification: "match_parent obliga a la vista a expandirse hasta rellenar todo el ancho o alto disponible que le deje su contenedor."
            },
            {
                q: "¿Qué tipo de permisos estarán desactivados por defecto en dispositivos a partir de API 23 o superior?",
                options: ["Permisos de riesgos.", "En API 23 todos los permisos están desactivados por defecto.", "Permisos normales.", "En API 23 no se requieren permisos."],
                correct: "Permisos de riesgos.",
                justification: "Desde Android 6.0, los permisos peligrosos (cámara, SMS, ubicación) no se aceptan al instalar; hay que pedirlos al usuario mediante un diálogo interactivo."
            },
            {
                q: "Según la arquitectura del sistema Android, los drivers de la Cámara se encuentran en la capa:",
                options: ["System server.", "Application Framework.", "Media Server.", "Linux Kernel."],
                correct: "Linux Kernel.",
                justification: "La capa profunda 'Linux Kernel' es la que se encarga de interactuar directamente con el hardware del móvil usando los controladores."
            },
            {
                q: "¿Cuales son las siglas de los cinco principios que pueden ayudarnos a tener un buen código o un código más limpio?",
                options: ["SOULD.", "SALID.", "SOLID.", "SILOD."],
                correct: "SOLID.",
                justification: "Es el estándar en programación orientada a objetos (Single responsibility, Open/closed, Liskov substitution, Interface segregation, Dependency inversion)."
            },
            {
                q: "¿Cómo se denomina el entorno de EJECUCIÓN de Android?",
                options: ["ADV (Android Virtual Device, AVD).", "ADB (Android Debug Bridge).", "ART (Android Runtime).", "JDK (Java Development Kit)."],
                correct: "ART (Android Runtime).",
                justification: "Es la máquina virtual moderna de Android que compila el código de las apps para lograr el mejor rendimiento en los dispositivos."
            },
            {
                q: "Indica cuál de los siguientes no es un servicio multimedia que puede ser usado por Android:",
                options: ["Search Service.", "Camera Service.", "MediaPlayer Service.", "AudioFlinger."],
                correct: "Search Service.",
                justification: "El servicio de búsquedas (Search Service) no gestiona flujos de imagen o sonido, sino información de texto y consultas."
            },
            {
                q: "El tamaño px se corresponde con:",
                options: ["Es 1/72 de una pulgada.", "La resolución actual de la pantalla.", "El tamaño de la pantalla.", "Ninguna de las respuestas es correcta."],
                correct: "La resolución actual de la pantalla.",
                justification: "Un px equivale a un píxel físico en la pantalla, por lo que su tamaño varía drásticamente dependiendo de la resolución de cada dispositivo específico."
            },
            {
                q: "Una de las herramientas que Android Studio usa para solucionar e identificar errores la encontramos en las pestañas inferiores, muestra errores del sistema y se conoce como:",
                options: ["Logcat.", "Gradle.", "AndroidManifest.xml.", "error.xml."],
                correct: "Logcat.",
                justification: "Es la consola de depuración en vivo donde podemos ver qué está ocurriendo 'bajo el capó' o por qué ha colapsado una app."
            },
            {
                q: "Cada actividad tiene:",
                options: ["capa lógica (...) y parte gráfica (archivos java...).", "parte gráfica (...) y capa lógica (archivos xml...).", "capa lógica (establece el funcionamiento) y parte gráfica (son los archivos xml que forman los distintos layouts).", "parte gráfica (...) y capa lógica (archivos java...)."],
                correct: "capa lógica (establece el funcionamiento) y parte gráfica (son los archivos xml que forman los distintos layouts).",
                justification: "La lógica siempre va en ficheros .kt o .java, mientras que el diseño de interfaces se organiza con etiquetas dentro de un fichero .xml."
            },
            {
                q: "¿Qué protocolo se utilizará para el envío de streams multimedia?",
                options: ["Exoplayer.", "FTP.", "RTP.", "UDP."],
                correct: "RTP.",
                justification: "El Real-Time Transport Protocol es el protocolo estándar en redes para transportar datos con propiedades de tiempo real, como videollamadas."
            },
            {
                q: "Para implementar Firebase a nuestro proyecto se descarga un archivo .json y se instala en la ruta:",
                options: ["Project/[nombre_proyecto]/.idea.", "Android/app/res.", "Android/app/java.", "Project/[nombre_proyecto]/.app."],
                correct: "Project/[nombre_proyecto]/.app.",
                justification: "El archivo de claves (google-services.json) debe colocarse en el módulo raíz de la aplicación para que Android Studio lo detecte al compilar."
            },
            {
                q: "¿Para qué se utiliza la siguiente línea de código? <uses-permission android:name=\"android.permission.CAMERA\"/>",
                options: ["Da permiso a la aplicación para conectarse a Internet.", "Da permiso a la aplicación para poder usar la cámara. Se declara en el AndroidManifest.xml.", "Da permiso a la aplicación para poder usar la cámara. Se declara en el AndroidManifest.java.", "Da permiso a la aplicación para poder usar la cámara. Se declara en el layout."],
                correct: "Da permiso a la aplicación para poder usar la cámara. Se declara en el AndroidManifest.xml.",
                justification: "Todo uso de hardware bloqueado por el sistema debe declararse primero obligatoriamente dentro del manifiesto del proyecto."
            },
            {
                q: "¿Qué permiso debemos definir en Android Manifest para poder leer un SMS?",
                options: ["<uses-permission android:name=\"android.permission.READ_SMS\"/>.", "<uses-permission android:name=\"android.permission.READSMS\"/>.", "<uses-permission android:name=\"android.permission.SMS\"/>.", "<uses-permission android:name=\"android.permission.READ\"/>."],

            },
            {
                q: "En MediaPlayer, ¿cuál de las siguientes es de bajo nivel y destaca en la reproducción de audio ya decodificado?",

                correct: "AudioTrack.",

            {
                q: "El que NO pertenece al grupo de los servicios del sistema es:",
                options: ["Gestor de Actividades.", "Servicios de búsqueda.", "Gestor de ventanas.", "Servicios MediaPlayer."],
                correct: "Servicios MediaPlayer.",
                justification: "MediaPlayer es una API para desarrolladores ubicada en el 'Application Framework', y no es un componente núcleo del System Server."
            },
            {
                q: "\"Puede gestionar una cola de sonidos de forma que sepa en cada momento cuál o cuáles de ellos debe reproducir\". Esto define a:",
                options: ["ToneGenerator.", "MediaPlayer.", "AudioTrack.", "SoundPool."],
                correct: "SoundPool.",

            },
            {
                q: "Para reproducir frecuencias en forma de pitido, utilizaremos:",
                options: ["ToneGenerator.", "AudioTrack.", "MediaService.", "SoundPool."],

            {
                q: "¿Cuál es la función del archivo AndroidManifest.xml en una aplicación de Android?",
                options: ["Contiene el código fuente de la aplicación.", "Contiene los recursos utilizados por la aplicación.", "Define la estructura de la aplicación y sus componentes, como las actividades y servicios.", "Almacena los datos de la aplicación."],
                correct: "Define la estructura de la aplicación y sus componentes, como las actividades y servicios.",
                justification: "Actúa como el mapa o plano de configuración donde se le dice al sistema cuántas pantallas tiene tu app y qué permisos va a exigir."
            },
            {
                q: "¿Qué es un BroadcastReceiver?",
                options: ["Un componente que muestra una lista de elementos desplazable.", "Un componente que se utiliza para almacenar datos en la base de datos de la aplicación.", "Un componente que permite a la aplicación recibir mensajes del sistema o de otras aplicaciones.", "Un componente que muestra una notificación en la barra de estado del dispositivo."],
                correct: "Un componente que permite a la aplicación recibir mensajes del sistema o de otras aplicaciones.",

            },
            {
                q: "¿Qué es el método execSQL() en SQLite?",
                options: ["Un método para abrir la base de datos.", "Un método para cerrar la base de datos.", "Un método para ejecutar una consulta SQL.", "Un método para borrar la base de datos."],
                correct: "Un método para ejecutar una consulta SQL.",
                justification: "Permite inyectar sentencias SQL directas (creación de tablas o eliminaciones masivas) que no devuelven datos en un Cursor."
            },
            {
                q: "¿Qué es Room Database?",
                options: ["Un sistema de gestión de bases de datos relacionales.", "Una biblioteca de persistencia de objetos en Android.", "Una base de datos en memoria que se utiliza para pruebas en Android.", "Un lenguaje de programación utilizado para el desarrollo de aplicaciones Android."],
                correct: "Una biblioteca de persistencia de objetos en Android.",

            },
            {
                q: "¿Cuál es el formato de los datos almacenados en Firebase Realtime Database?",
                options: ["CSV", "XML", "JSON", "TXT"],
                correct: "JSON",
                justification: "Se trata de una base de datos NoSQL que guarda toda la información online representada mediante un inmenso árbol estructurado de formato JSON."
            },
            {
                q: "¿Cómo se estructuran los datos en Firebase Realtime Database?",

                correct: "En nodos y hojas.",
                justification: "En la estructura de árbol de los ficheros JSON, las diferentes secciones de datos equivalen a las ramificaciones (nodos) y los valores a las hojas del árbol."
            },

                correct: "Update().",
                justification: "El libro explica que el método Start() se ejecuta cuando la escena carga el objeto, mientras que la función Update() se llama una vez por cada frame, es decir, una vez por cada ciclo de renderizado."

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // === Estado para navegación por teclado ===
        let preSelectedIndex = -1;   // índice de la opción resaltada (aún sin confirmar)
        let questionAnswered = false; // true cuando ya se ha confirmado la respuesta
        // =========================================

        // Mezclar array (Fisher-Yates)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Iniciar Quiz
        function startQuiz() {
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            
            // Clonar las preguntas
            quizData = JSON.parse(JSON.stringify(rawQuestions));
            
            // Aleatorizar preguntas
            quizData = shuffleArray(quizData);
            
            // Aleatorizar opciones de respuesta
            quizData.forEach(q => {
                q.options = shuffleArray(q.options);
            });

            currentQuestionIndex = 0;
            score = 0;
            updateUI();
            renderQuestion();
        }

        function updateUI() {
            document.getElementById('progress').innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
            document.getElementById('score').innerText = `Aciertos: ${score}`;
        }

        function renderQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            document.getElementById('justification').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            // Resetear estado de teclado para la nueva pregunta
            preSelectedIndex = -1;
            questionAnswered = false;

            currentQ.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.dataset.index = idx;

                // Número visible que indica qué tecla pulsar
                const numSpan = document.createElement('span');
                numSpan.className = 'option-number';
                numSpan.innerText = idx + 1;
                btn.appendChild(numSpan);

                const textSpan = document.createElement('span');
                textSpan.className = 'option-text';
                textSpan.innerText = option;
                btn.appendChild(textSpan);

                btn.onclick = () => commitOption(option, currentQ.correct, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // Resalta visualmente una opción sin confirmarla todavía
        function preSelectOption(index) {
            if (questionAnswered) return;
            const buttons = document.querySelectorAll('.option-btn');
            if (index < 0 || index >= buttons.length) return;

            buttons.forEach(b => b.classList.remove('pre-selected'));
            buttons[index].classList.add('pre-selected');
            preSelectedIndex = index;
        }

        // Confirma definitivamente la opción seleccionada (equivalente a hacer click)
        function commitOption(selected, correct, btnElement) {
            const currentQ = quizData[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');

            allBtns.forEach(btn => {
                btn.classList.remove('pre-selected');
                btn.disabled = true;
                if (btn.querySelector('.option-text').innerText === correct) {
                    btn.classList.add('correct');
                }
            });

            if (selected === correct) {
                score++;
                updateUI();
            } else {
                btnElement.classList.add('incorrect');
            }

            questionAnswered = true;

            document.getElementById('justification-text').innerText = currentQ.justification;
            document.getElementById('justification').style.display = 'block';

            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('next-btn').innerHTML =
                (currentQuestionIndex === quizData.length - 1 ? 'Ver Resultados' : 'Siguiente Pregunta')
                + '<span class="kbd-inline">Enter</span>';
        }

        // Compatibilidad: mantenemos la firma anterior por si se llama desde otro sitio
        function selectOption(selected, correct, btnElement) {
            commitOption(selected, correct, btnElement);
        }

        function handleNext() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                updateUI();
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        }

        // === MANEJADOR DE TECLADO ===
        document.addEventListener('keydown', (e) => {
            // En la pantalla de resultados: Enter reinicia el cuestionario
            if (document.getElementById('results-screen').style.display === 'block') {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    startQuiz();
                }
                return;
            }

            // Teclas 1-4 (tanto del teclado normal como del numpad con NumLock activo)
            if (/^[1-4]$/.test(e.key)) {
                e.preventDefault();
                const idx = parseInt(e.key, 10) - 1;
                preSelectOption(idx);
                return;
            }

            // Soporte explícito por code para numpad incluso sin NumLock activo
            if (/^Numpad[1-4]$/.test(e.code)) {
                e.preventDefault();
                const idx = parseInt(e.code.replace('Numpad', ''), 10) - 1;
                preSelectOption(idx);
                return;
            }

            // Flechas arriba/abajo: navegar entre las opciones (con vuelta al extremo)
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (questionAnswered) return;
                const buttons = document.querySelectorAll('.option-btn');
                if (buttons.length === 0) return;

                let nextIndex;
                if (preSelectedIndex < 0) {
                    nextIndex = (e.key === 'ArrowDown') ? 0 : buttons.length - 1;
                } else {
                    const delta = (e.key === 'ArrowDown') ? 1 : -1;
                    nextIndex = (preSelectedIndex + delta + buttons.length) % buttons.length;
                }
                preSelectOption(nextIndex);
                return;
            }

            // ENTER: confirma la opción pre-seleccionada o avanza si ya está corregida
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!questionAnswered) {
                    if (preSelectedIndex >= 0) {
                        const buttons = document.querySelectorAll('.option-btn');
                        buttons[preSelectedIndex].click();
                    }
                } else {
                    handleNext();
                }
            }
        });
        // ============================

        // Iniciar
        window.onload = startQuiz;

    </script>
